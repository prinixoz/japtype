<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">

        <link href="https://fonts.googleapis.com/css2?family=Kosugi+Maru&display=swap" rel="stylesheet">

        <link rel="stylesheet" href="./css/style.css">
        <link rel="stylesheet" href="./css/menu.css">
        <link rel="stylesheet" href="./css/result.css">
        <link rel="stylesheet" href="./css/mobile.css">
        <link rel="stylesheet" href="./css/setting-bar.css">

    </head>
    <body>

        <div class="container">

            <!-- SETTINGS BAR -->

            <div class="settings-bar collapsed">

                <div class="menu-btn">☰</div>

                <div class="divider"></div>

                <!-- dynamic kana buttons will appear here -->
                <div id="kana-options"></div>

                <div class="divider"></div>

                <div class="option active">🕒 time</div>
                <div class="option">A words</div>

                <div class="divider"></div>

                <div class="time-group">
                    <div class="time active">15</div>
                    <div class="time">30</div>
                    <div class="time">60</div>
                    <div class="time">120</div>
                </div>

                <div class="divider"></div>

                <div class="close-btn">×</div>
                <div class="expand-btn">▶</div>

            </div>

            <!-- TYPING AREA -->
            <div id="preview"></div>

            <div id="wrap">
                <div id="words"></div>
            </div>

            <input id="input" autofocus>


            <!-- FOOTER -->
            <div class="footer">
                <span><kbd>tab</kbd> — restart test</span>
                <span style="margin-left:20px;"><kbd>ctrl</kbd> + <kbd>p</kbd> — command menu</span>
            </div>

        </div>


        <!-- COMMAND MENU -->
        <div id="commandMenu">

            <input id="commandInput" placeholder="Search...">

            <div id="commandList">

                <div class="cmd"><span class="icon">あ</span> Hiragana</div>
                <div class="cmd"><span class="icon">ア</span> Katakana</div>
                <div class="cmd"><span class="icon">漢</span> Kanji</div>
                <div class="cmd"><span class="icon">〄</span> Mixed Kana</div>

                <div class="cmd"><span class="icon">↻</span> reset</div>

                <div class="cmd"><span class="icon">🎨</span> Theme</div>
                <div class="cmd"><span class="icon">🔤</span> Font</div>

            </div>

        </div>

        <div id="results">

            <h2>RESULTS</h2>

            <div class="stats">
                accuracy
                speed
                correct
                wrong
                time
            </div>

            <div class="mistakes">
                most mistakes
            </div>

            <div class="buttons">
                restart
                new mode
            </div>

        </div>


        <!-- DATA -->
        <script defer src="./js/hiragana.js"></script>
        <script defer src="./js/katakana.js"></script>
        <script defer src="./js/mixedkana.js"></script>
        <script defer src="./js/kanji.js"></script>

        <!-- Customization -->
        <script defer src="./js/themes.js"></script>

        <script defer src="./js/settingbar.js"></script>
        <script defer src="./js/menu.js"></script>
        <script defer src="./js/result.js"></script>
        <script defer src="main.js"></script>


    </body>
</html>
